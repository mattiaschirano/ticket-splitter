<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="app">

<div class="header">

<h1>Ticket</h1>
<p>Dividi la spesa con i buoni</p>

</div>


<div id="cameraContainer" class="camera hidden">
<div id="reader"></div>
</div>


<div id="productList" class="product-list"></div>


<div class="bottom-actions">

<button id="scanBtn" class="scan-button">
📷 Scansiona
</button>

</div>


<div id="priceSheet" class="sheet">

<div class="sheet-content">

<input id="productNameInput" placeholder="Nome prodotto">

<input id="priceInput" type="number" step="0.01" placeholder="Prezzo">

<div class="sheet-actions">

<button id="cancelPrice">Annulla</button>
<button id="savePrice">Salva</button>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
