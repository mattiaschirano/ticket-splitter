<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Splitter</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="app">

<div class="header">
<h1>Ticket Splitter</h1>
<p>Dividi la spesa con i buoni</p>
</div>

<div id="cameraContainer" class="camera hidden">
<div id="reader"></div>
</div>

<div id="productList" class="product-list"></div>

<div id="tabs" class="tabs hidden">

<button id="tabA" class="tab active">
Mattia
</button>

<button id="tabB" class="tab">
Silvia
</button>

</div>

<div id="receiptList" class="product-list hidden"></div>

<div class="bottom-actions">

<button id="scanBtn" class="scan-button">
📷 Scansiona
</button>

<button id="splitBtn" class="scan-button hidden">
Dividi
</button>

</div>

<div id="summaryCard" class="summary hidden">

<p id="extraText"></p>

<button id="ticketSummary"></button>

</div>

<div id="priceSheet" class="sheet">

<div class="sheet-content">

<input id="productNameInput" placeholder="Nome prodotto">

<input id="priceInput" type="number" step="0.01" placeholder="Prezzo">

<div class="sheet-actions">

<button id="savePrice">
Salva
</button>

<button id="cancelPrice">
Annulla
</button>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
