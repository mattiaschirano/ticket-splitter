<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ticket Splitter</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>Ticket Splitter</h1>

<div id="reader"></div>

<button id="startScan">Scan product</button>

<div class="receipts">

<div class="receipt">
<h2>🧾 Scontrino A</h2>
<ul id="receiptA"></ul>
</div>

<div class="receipt">
<h2>🧾 Scontrino B</h2>
<ul id="receiptB"></ul>
</div>

</div>

<div id="totals"></div>

</div>


<!-- Bottom Sheet -->

<div id="priceSheet" class="sheet">

<div class="sheet-content">

<h3>Inserisci prezzo</h3>

<input id="priceInput" type="number" placeholder="€">

<div class="sheet-buttons">

<button id="cancelPrice">Annulla</button>

<button id="savePrice">Salva</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
