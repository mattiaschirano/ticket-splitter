<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Splitter</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>


<body>

<div class="container">


<div class="header">

<h1>Dividi la spesa con i tuoi buoni pasto</h1>
</div>



<div id="productList" class="product-list"></div>



<div id="tabs" class="tabs hidden">

<button class="tab active" id="tabA">Mattia</button>
<button class="tab" id="tabB">Silvia</button>

</div>



<div id="receiptList" class="product-list hidden"></div>



<div class="bottom-actions">

<button id="scanBtn" class="primary">
📷 Scansiona
</button>

<button id="splitBtn" class="secondary hidden">
Dividi
</button>

</div>



<div id="summaryCard" class="summary hidden">

<p id="extraText"></p>

<button id="ticketSummary"></button>

</div>



<div id="cameraContainer" class="camera-container hidden">
  <div id="reader"></div>
</div>



<div id="priceSheet" class="sheet">

<div class="sheet-content">

<h3>Prodotto</h3>

<input id="productNameInput" placeholder="Nome prodotto">

<input id="priceInput" type="number" step="0.01" placeholder="Prezzo">

<div class="sheet-actions">

<button id="cancelPrice">Annullaa</button>
<button id="savePrice">Salva</button>

</div>

</div>

</div>


</div>

<script src="app.js"></script>

</body>

</html>
